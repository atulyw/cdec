apiVersion: apps/v1
kind: Deployment
metadata:
  name: enrollment-service
  namespace: cloudblitz
  labels:
    app: enrollment-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: enrollment-service
  template:
    metadata:
      labels:
        app: enrollment-service
        version: v1
    spec:
      containers:
      - name: enrollment-service
        image: 271376211486.dkr.ecr.eu-west-1.amazonaws.com/enrollment-service:latest
        ports:
        - containerPort: 8083
