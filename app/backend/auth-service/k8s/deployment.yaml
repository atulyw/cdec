apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: cloudblitz
  labels:
    app: auth-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        version: v1
    spec:
      containers:
      - name: auth-service
        image: 021097241246.dkr.ecr.eu-west-1.amazonaws.com/auth-service:latest
        ports:
        - containerPort: 8081
